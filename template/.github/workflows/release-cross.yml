name: release

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: {% raw %}${{ github.workflow }}{% endraw %}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN: {{project-name}}

jobs:
  build-all:
    name: build {% raw %}${{ matrix.target }}{% endraw %}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          # tier 1
          # - x86_64-unknown-linux-gnu
          # - aarch64-unknown-linux-gnu
          # - i686-unknown-linux-gnu

          # tier 2, glibc
          # - arm-unknown-linux-gnueabi
          # - arm-unknown-linux-gnueabihf
          # - armv5te-unknown-linux-gnueabi
          # - armv7-unknown-linux-gnueabi
          # - armv7-unknown-linux-gnueabihf
          # - i586-unknown-linux-gnu
          # - loongarch64-unknown-linux-gnu
          # - powerpc-unknown-linux-gnu
          # - powerpc64-unknown-linux-gnu
          # - powerpc64le-unknown-linux-gnu
          # - riscv64gc-unknown-linux-gnu
          # - s390x-unknown-linux-gnu
          # - sparc64-unknown-linux-gnu
          # - thumbv7neon-unknown-linux-gnueabihf

          # tier 2, musl (statically linked)
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-musleabi
          # - arm-unknown-linux-musleabihf
          - armv5te-unknown-linux-musleabi
          - armv7-unknown-linux-musleabi
          # - armv7-unknown-linux-musleabihf
          - i586-unknown-linux-musl
          # - loongarch64-unknown-linux-musl
          # - riscv64gc-unknown-linux-musl

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: {% raw %}${{ matrix.target }}{% endraw %}
          cache: false
      - name: dependencies
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2.78.1
        with:
          tool: cross
      - name: build
        env:
          TARGET: {% raw %}${{ matrix.target }}{% endraw %}
        shell: bash
        run: |
          cross build --release --locked --target "$TARGET"
      - name: package
        env:
          TARGET: {% raw %}${{ matrix.target }}{% endraw %}
        shell: bash
        run: |
          arch="${TARGET%%-unknown-linux-*}"
          abi="${TARGET#*-unknown-linux-}"
          # if [ "$abi" = gnu ]; then
          #   name="${BIN}-linux-${arch}"
          # else
          #   name="${BIN}-linux-${arch}-${abi}"
          # fi
          name="${BIN}-linux-${arch}"
          echo "NAME=$name" >> "$GITHUB_ENV"
          cp "target/${TARGET}/release/${BIN}" "$name"
      - name: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: {% raw %}${{ env.NAME }}{% endraw %}
          path: {% raw %}${{ env.NAME }}{% endraw %}

  release:
    name: release
    needs: build-all
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # needed to create the github release and upload assets
    steps:
      - name: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
      - name: publish # zizmor: ignore[superfluous-actions]
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "{% raw %}${{ env.BIN }}{% endraw %}-linux-*"
          generate_release_notes: true
