name: build

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build-linux-plus-checks:
    name: build-linux-plus-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: prepare IDA SDK
        env:
          IDASDK_URL: ${{ secrets.IDASDK_URL }}
          IDASDK_PASSWORD: ${{ secrets.IDASDK_PASSWORD }}
        run: |
          curl -o "${{ runner.temp }}/idasdk.zip" -L "$IDASDK_URL"
          unzip -d "${{ runner.temp }}" -P "$IDASDK_PASSWORD" "${{ runner.temp }}/idasdk.zip"
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo build

  build-macos:
    name: build-macos
    runs-on: macOS-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: prepare IDA SDK
        env:
          IDASDK_URL: ${{ secrets.IDASDK_URL }}
          IDASDK_PASSWORD: ${{ secrets.IDASDK_PASSWORD }}
        run: |
          curl -o "${{ runner.temp }}/idasdk.zip" -L "$IDASDK_URL"
          unzip -d "${{ runner.temp }}" -P "$IDASDK_PASSWORD" "${{ runner.temp }}/idasdk.zip"
      - name: build
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo build

  build-windows:
    name: build-windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: install clang/llvm
        uses: KyleMayes/install-llvm-action@e0a8dc9cb8a22e8a7696e8a91a4e9581bec13181
        with:
          version: "18.1.8"
          directory: "${{ runner.temp }}/llvm-18"
      - name: configure clang/llvm environment
        run: echo "LIBCLANG_PATH=$((gcm clang).source -replace "clang.exe")" >> $env:GITHUB_ENV
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: prepare IDA SDK
        env:
          IDASDK_URL: ${{ secrets.IDASDK_URL }}
          IDASDK_PASSWORD: ${{ secrets.IDASDK_PASSWORD }}
        run: |
          curl -o "${{ runner.temp }}/idasdk.zip" -L $env:IDASDK_URL
          unzip -d "${{ runner.temp }}" -P $env:IDASDK_PASSWORD "${{ runner.temp }}/idasdk.zip"
      - name: build
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo build
