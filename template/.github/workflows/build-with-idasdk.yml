name: build

permissions:
  contents: read

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: prepare IDA SDK
        env:
          IDASDK_URL: ${{ secrets.IDASDK_URL }}
          IDASDK_PASSWORD: ${{ secrets.IDASDK_PASSWORD }}
        run: |
          curl -o "${{ runner.temp }}/idasdk.zip" -L "$IDASDK_URL"
          unzip -d "${{ runner.temp }}" -P "$IDASDK_PASSWORD" "${{ runner.temp }}/idasdk.zip"
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo build

  build-macos:
    name: build-macos
    runs-on: macOS-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: prepare IDA SDK
        env:
          IDASDK_URL: ${{ secrets.IDASDK_URL }}
          IDASDK_PASSWORD: ${{ secrets.IDASDK_PASSWORD }}
        run: |
          curl -o "${{ runner.temp }}/idasdk.zip" -L "$IDASDK_URL"
          unzip -d "${{ runner.temp }}" -P "$IDASDK_PASSWORD" "${{ runner.temp }}/idasdk.zip"
      - name: build
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo build

  build-windows:
    name: build-windows
    runs-on: windows-latest
    steps:
      - name: install clang/llvm
        uses: KyleMayes/install-llvm-action@e0a8dc9cb8a22e8a7696e8a91a4e9581bec13181
        with:
          version: "18.1.8"
          directory: "${{ runner.temp }}/llvm-18"
      - name: configure clang/llvm environment
        run: echo "LIBCLANG_PATH=$((gcm clang).source -replace "clang.exe")" >> $env:GITHUB_ENV
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: prepare IDA SDK
        env:
          IDASDK_URL: ${{ secrets.IDASDK_URL }}
          IDASDK_PASSWORD: ${{ secrets.IDASDK_PASSWORD }}
        run: |
          curl -o "${{ runner.temp }}/idasdk.zip" -L $env:IDASDK_URL
          unzip -d "${{ runner.temp }}" -P $env:IDASDK_PASSWORD "${{ runner.temp }}/idasdk.zip"
      - name: build
        env:
          IDASDKDIR: "${{ runner.temp }}/idasdk"
        run: cargo build
