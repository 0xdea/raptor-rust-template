name: build

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: {% raw %}${{ github.workflow }}{% endraw %}-{% raw %}${{ github.ref }}{% endraw %}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build-linux-plus-checks:
    name: build-linux-plus-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt, clippy
          cache-directories: ~/.cargo/advisory-db
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: rustfmt
        run: cargo fmt --all --check
      - name: build
        run: cargo build --workspace --locked
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: install cargo-audit
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-audit
      - name: audit
        run: cargo audit
      - name: doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: test
        run: cargo test --workspace --locked
      #- name: wasm-target
      #  run: rustup target add wasm32-wasip2
      #- name: build-extension-wasm
      #  run: cargo build --locked --target wasm32-wasip2 -p {{project-name}}

  build-macos:
    name: build-macos
    runs-on: macOS-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: build
        run: cargo build --workspace --locked
      - name: test
        run: cargo test --workspace --locked
      #- name: wasm-target
      #  run: rustup target add wasm32-wasip2
      #- name: build-extension-wasm
      #  run: cargo build --locked --target wasm32-wasip2 -p {{project-name}}

  build-windows:
    name: build-windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: build
        run: cargo build --workspace --locked
      - name: test
        run: cargo test --workspace --locked
      #- name: wasm-target
      #  run: rustup target add wasm32-wasip2
      #- name: build-extension-wasm
      #  run: cargo build --locked --target wasm32-wasip2 -p {{project-name}}

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
